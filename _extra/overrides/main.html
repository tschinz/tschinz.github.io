{% extends "base.html" %}

{% block content %}
{{ super() }}

<!-- Privacy Notice - Minimalist Yellow Triangle -->
<div id="privacy-trigger" class="te-privacy-trigger" title="Privacy Policy">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Yellow Triangle -->
    <path d="M50 5 L95 90 L5 90 Z" fill="#f5c518" stroke="#000" stroke-width="2" />
    <!-- Hand Icon -->
    <g transform="translate(50, 55)" fill="#000">
      <!-- Palm -->
      <ellipse cx="0" cy="8" rx="12" ry="10" />
      <!-- Fingers -->
      <rect x="-10" y="-20" width="4" height="25" rx="2" />
      <rect x="-4" y="-25" width="4" height="30" rx="2" />
      <rect x="2" y="-23" width="4" height="28" rx="2" />
      <rect x="8" y="-18" width="4" height="23" rx="2" />
      <!-- Thumb -->
      <ellipse cx="-14" cy="0" rx="5" ry="4" transform="rotate(-30 -14 0)" />
    </g>
  </svg>
</div>

<!-- Privacy Popup (hidden by default) -->
<div id="privacy-popup" class="te-privacy-popup">
  <div class="te-privacy-popup-content">
    <button id="privacy-close" class="te-privacy-close">&times;</button>
    <p class="te-privacy-text">
      we use privacy-first analytics<br />
      that don't track you with cookies.<br />
      no personal data is collected.<br />
      <strong>GDPR &amp; CCPA compliant.</strong>
    </p>
    <a href="{{ config.site_url }}about/privacy.html" class="te-privacy-link">read our privacy policy →</a>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const trigger = document.getElementById("privacy-trigger");
    const popup = document.getElementById("privacy-popup");
    const closeBtn = document.getElementById("privacy-close");

    // Toggle popup on triangle click
    trigger.addEventListener("click", function (e) {
      e.stopPropagation();
      popup.classList.toggle("te-privacy-popup-show");
    });

    // Close popup on close button click
    closeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      popup.classList.remove("te-privacy-popup-show");
    });

    // Close popup when clicking outside
    document.addEventListener("click", function (e) {
      if (!popup.contains(e.target) && !trigger.contains(e.target)) {
        popup.classList.remove("te-privacy-popup-show");
      }
    });
  });
</script>
{% endblock %}
